<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Pramuka SMPN 1 Leuwigoong</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-back">
        <i class="fas fa-arrow-left"></i> Kembali ke Beranda
      </a>

      <div class="auth-card">
        <div class="auth-header">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="55" fill="none" stroke="#2d5016" stroke-width="3"/>
            <circle cx="60" cy="60" r="48" fill="#f0f8e8"/>
            <path d="M60 18 L66 38 L88 38 L70 50 L76 70 L60 58 L44 70 L50 50 L32 38 L54 38 Z" fill="#2d5016"/>
            <path d="M44 82 L60 92 L76 82" stroke="#2d5016" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
          <h1>Selamat Datang!</h1>
          <p>Masuk ke akun Pramuka kamu</p>
        </div>

        <!-- Google Login -->
        <button class="btn btn-google btn-block" id="googleLoginBtn" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Masuk dengan Google
        </button>

        <div class="auth-divider">
          <span>atau masuk dengan email</span>
        </div>

        <!-- Email Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="email">
              <i class="fas fa-envelope"></i> Email
            </label>
            <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              <i class="fas fa-lock"></i> Password
            </label>
            <div style="position:relative;">
              <input type="password" id="password" class="form-input" placeholder="Masukkan password" required style="padding-right:45px;">
              <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#999;cursor:pointer;font-size:16px;">
                <i class="fas fa-eye" id="togglePwdIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginSubmitBtn">
            <i class="fas fa-sign-in-alt"></i> Masuk
          </button>
        </form>

        <div class="auth-footer">
          <p>Belum punya akun? <a href="/register.html">Daftar Sekarang</a></p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (AuthManager.isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('togglePwdIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginSubmitBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Email dan password harus diisi', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          AuthManager.setToken(data.token);
          AuthManager.setUser(data.user);
          showToast('Login berhasil! Selamat datang kembali.', 'success');
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/dashboard.html';
            }
          }, 800);
        } else {
          showToast(data.error || 'Login gagal', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
        }
      } catch (err) {
        showToast('Tidak bisa terhubung ke server', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
      }
    }

    async function handleGoogleLogin() {
      const btn = document.getElementById('googleLoginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      const result = await AuthManager.googleSignIn();

      if (result) {
        showToast('Login berhasil!', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);
      } else {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg> Masuk dengan Google`;
      }
    }
  </script>
</body>
</html>
