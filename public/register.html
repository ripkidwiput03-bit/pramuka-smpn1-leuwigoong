<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Pramuka SMPN 1 Leuwigoong</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <a href="/" class="auth-back">
        <i class="fas fa-arrow-left"></i> Kembali ke Beranda
      </a>

      <div class="auth-card">
        <div class="auth-header">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="55" fill="none" stroke="#2d5016" stroke-width="3"/>
            <circle cx="60" cy="60" r="48" fill="#f0f8e8"/>
            <circle cx="60" cy="40" r="14" fill="#2d5016"/>
            <path d="M36 80 C36 62 84 62 84 80" fill="#2d5016"/>
            <circle cx="80" cy="70" r="10" fill="#ffd700" stroke="#2d5016" stroke-width="2"/>
            <path d="M76 70 L79 73 L84 67" stroke="#2d5016" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </svg>
          <h1>Bergabung!</h1>
          <p>Daftar sebagai anggota Pramuka</p>
        </div>

        <!-- Google Register -->
        <button class="btn btn-google btn-block" id="googleRegBtn" onclick="handleGoogleRegister()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Daftar dengan Google
        </button>

        <div class="auth-divider">
          <span>atau daftar dengan email</span>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label" for="displayName">
              <i class="fas fa-user"></i> Nama Lengkap
            </label>
            <input type="text" id="displayName" class="form-input" placeholder="Nama lengkap kamu" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">
              <i class="fas fa-envelope"></i> Email
            </label>
            <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="regu">
                <i class="fas fa-flag"></i> Regu
              </label>
              <select id="regu" class="form-input">
                <option value="">Pilih Regu</option>
                <option value="Garuda">Garuda</option>
                <option value="Elang">Elang</option>
                <option value="Rajawali">Rajawali</option>
                <option value="Cendrawasih">Cendrawasih</option>
                <option value="Mawar">Mawar</option>
                <option value="Melati">Melati</option>
                <option value="Anggrek">Anggrek</option>
                <option value="Dahlia">Dahlia</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="kelas">
                <i class="fas fa-school"></i> Kelas
              </label>
              <select id="kelas" class="form-input">
                <option value="">Pilih Kelas</option>
                <option value="7A">7A</option>
                <option value="7B">7B</option>
                <option value="7C">7C</option>
                <option value="7D">7D</option>
                <option value="8A">8A</option>
                <option value="8B">8B</option>
                <option value="8C">8C</option>
                <option value="8D">8D</option>
                <option value="9A">9A</option>
                <option value="9B">9B</option>
                <option value="9C">9C</option>
                <option value="9D">9D</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              <i class="fas fa-lock"></i> Password
            </label>
            <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required minlength="6">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">
              <i class="fas fa-lock"></i> Konfirmasi Password
            </label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerSubmitBtn">
            <i class="fas fa-user-plus"></i> Daftar Sekarang
          </button>
        </form>

        <div class="auth-footer">
          <p>Sudah punya akun? <a href="/login.html">Masuk di sini</a></p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/auth.js"></script>
  <script>
    if (AuthManager.isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerSubmitBtn');

      const displayName = document.getElementById('displayName').value.trim();
      const email = document.getElementById('email').value.trim();
      const regu = document.getElementById('regu').value;
      const kelas = document.getElementById('kelas').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!displayName || !email || !password) {
        showToast('Nama, email, dan password harus diisi', 'error');
        return;
      }

      if (password.length < 6) {
        showToast('Password minimal 6 karakter', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Password dan konfirmasi password tidak cocok', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftar...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, displayName, regu, kelas })
        });

        const data = await response.json();

        if (response.ok) {
          AuthManager.setToken(data.token);
          AuthManager.setUser(data.user);
          showToast('Registrasi berhasil! Selamat datang!', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);
        } else {
          showToast(data.error || 'Registrasi gagal', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';
        }
      } catch (err) {
        showToast('Tidak bisa terhubung ke server', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';
      }
    }

    async function handleGoogleRegister() {
      const btn = document.getElementById('googleRegBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

      const result = await AuthManager.googleSignIn();

      if (result) {
        showToast('Akun berhasil dibuat!', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);
      } else {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg> Daftar dengan Google`;
      }
    }
  </script>
</body>
</html>
